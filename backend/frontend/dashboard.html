<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart URL System - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="dashboard">
            <header>
                <h1>Smart URL Dashboard</h1>
                <button id="logoutBtn">Logout</button>
            </header>

            <section class="create-url">
                <h2>Create Short URL</h2>
                <form id="url-form">
                    <input type="url" id="original-url" placeholder="Enter long URL" required>
                    <input type="text" id="custom-alias" placeholder="Custom alias (optional)">
                    <button type="submit">Create Short URL</button>
                </form>
                <div id="url-message"></div>
            </section>

            <section class="urls-list">
                <h2>Your Short URLs</h2>
                <table id="urls-table">
                    <thead>
                        <tr>
                            <th>Original URL</th>
                            <th>Short Code</th>
                            <th>Clicks</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="urls-tbody">
                        <tr>
                            <td colspan="5">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>

</html>
